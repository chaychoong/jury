version: 2

project_name: jury

before:
  hooks:
    - go mod tidy

builds:
  - id: jury
    main: ./cmd/jury
    binary: jury
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # windows/arm64 is uncommon; drop it for a cleaner matrix.
      - goos: windows
        goarch: arm64

archives:
  - id: jury
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: chaychoong
    name: jury
  draft: false
  prerelease: auto # tags like v1.0.0-rc.1 are flagged pre-release automatically
